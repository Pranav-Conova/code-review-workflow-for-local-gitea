services:
  pr-reviewer:
    env_file:
      - ../.env
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: claude-pr-reviewer
    restart: unless-stopped
    ports:
      - "7000:7000"
    volumes:
      - review-data:/app/data
    environment:
      - POLL_INTERVAL=${POLL_INTERVAL:-10}
      - MAX_CONCURRENT_REVIEWS=${MAX_CONCURRENT_REVIEWS:-2}

volumes:
  review-data:
